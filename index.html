<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 font-sans">
    <main class="mx-auto max-w-4xl px-4 py-10">
      <header class="mb-8 flex flex-col gap-2">
        <h1 class="text-3xl font-bold text-violet-300">💰 Expense Tracker</h1>
        <p class="text-slate-300">
          Track spending with categories, dates, filters, and instant summaries.
        </p>
      </header>

      <section class="grid gap-4 sm:grid-cols-3 mb-6" aria-label="Expense summary">
        <article class="summary-card">
          <h2 class="summary-title">Total Spend</h2>
          <p id="summary-total" class="summary-value">$0.00</p>
        </article>
        <article class="summary-card">
          <h2 class="summary-title">This Month</h2>
          <p id="summary-month" class="summary-value">$0.00</p>
        </article>
        <article class="summary-card">
          <h2 class="summary-title">Top Category</h2>
          <p id="summary-category" class="summary-value">—</p>
        </article>
      </section>

      <section class="panel mb-6" aria-labelledby="add-expense-heading">
        <h2 id="add-expense-heading" class="section-heading">Add Expense</h2>

        <form id="expense-form" class="grid gap-3 md:grid-cols-4" novalidate>
          <div class="md:col-span-2">
            <label for="expense-name" class="input-label">Expense name</label>
            <input
              id="expense-name"
              name="name"
              type="text"
              required
              maxlength="80"
              autocomplete="off"
              placeholder="Groceries"
              class="input-base"
            />
          </div>
          <div>
            <label for="expense-amount" class="input-label">Amount (USD)</label>
            <input
              id="expense-amount"
              name="amount"
              type="number"
              min="0.01"
              step="0.01"
              required
              placeholder="45.90"
              class="input-base"
            />
          </div>
          <div>
            <label for="expense-category" class="input-label">Category</label>
            <select id="expense-category" name="category" class="input-base" required></select>
          </div>
          <div>
            <label for="expense-date" class="input-label">Date</label>
            <input id="expense-date" name="date" type="date" required class="input-base" />
          </div>
          <div class="md:col-span-3 flex items-end">
            <button type="submit" class="btn-primary">Add expense</button>
          </div>
        </form>
      </section>

      <section class="panel mb-6" aria-labelledby="filter-heading">
        <div class="mb-3 flex items-center justify-between gap-4 flex-wrap">
          <h2 id="filter-heading" class="section-heading mb-0">Filters</h2>
          <button id="clear-all" type="button" class="btn-danger">Clear all expenses</button>
        </div>

        <div class="grid gap-3 sm:grid-cols-2">
          <div>
            <label for="filter-category" class="input-label">Filter by category</label>
            <select id="filter-category" class="input-base"></select>
          </div>
          <div>
            <label for="filter-month" class="input-label">Filter by month</label>
            <input id="filter-month" type="month" class="input-base" />
          </div>
        </div>
      </section>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>

      <section class="panel" aria-labelledby="expense-list-heading">
        <h2 id="expense-list-heading" class="section-heading">Expenses</h2>
        <ul id="expense-list" class="space-y-3"></ul>
      </section>
    </main>

    <script type="module" src="./src/script.js"></script>
  </body>
</html>
